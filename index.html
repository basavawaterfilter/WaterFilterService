<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>Basava Water Filter Service – Bengaluru</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
/* ── RESET & TOKENS ──────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
:root{
  --B:#0057b8;--BD:#003d82;--BL:#eef5ff;
  --T:#00a896;--C:#00b4d8;--G:#f59e0b;
  --P:#7c3aed;--GR:#16a34a;
  --off:#f8fafc;--muted:#64748b;--bdr:#e2e8f0;
  --sh:0 4px 24px rgba(0,87,184,.10);
  --shl:0 16px 48px rgba(0,87,184,.15);
  --r:14px;--rs:8px;
  --bg:#fff;--text:#1a1a2e;--shadow-light:#f1f5f9;
}

body.dark-mode {
  --bg:#0f172a;--text:#e2e8f0;--off:#1e293b;--muted:#cbd5e1;--bdr:#334155;--shadow-light:#1e293b;
}

body{font-family:'Inter',sans-serif;color:var(--text);background:var(--bg);overflow-x:hidden;transition:background .3s,color .3s}
a{text-decoration:none;color:inherit}
ul{list-style:none}
img{max-width:100%;display:block}
.wrap{max-width:1180px;margin:0 auto;padding:0 24px}

/* ── UTILITIES ───────────────────────────────────────── */
.eyebrow{display:inline-block;font-size:.72rem;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--B);background:var(--BL);padding:5px 14px;border-radius:20px;margin-bottom:14px}
.eyebrow.lt{background:rgba(255,255,255,.15);color:rgba(255,255,255,.9)}
.sec-hd{text-align:center;margin-bottom:52px}
.sec-hd h2{font-family:'Space Grotesk',sans-serif;font-size:clamp(1.7rem,3.5vw,2.4rem);font-weight:800;color:var(--text);line-height:1.15}
.sec-hd.lt h2{color:#fff}
.sec-sub{color:var(--muted);margin-top:10px;font-size:.93rem}

/* ── HEADER ──────────────────────────────────────────── */
#hdr{position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(255,255,255,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--bdr);transition:box-shadow .3s;background:var(--bg)}
#hdr.scrolled{box-shadow:0 4px 24px rgba(0,0,0,.10)}
.hdr-in{display:flex;align-items:center;justify-content:space-between;padding:13px 28px;max-width:1180px;margin:0 auto;gap:18px}
.brand{display:flex;align-items:center;gap:11px;cursor:pointer}
.brand-icon{width:42px;height:42px;border-radius:11px;background:linear-gradient(135deg,var(--B),var(--C));display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.2rem;flex-shrink:0;transition:transform .2s}
.brand:hover .brand-icon{transform:scale(1.07) rotate(-5deg)}
.brand-name{display:block;font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:1.05rem;color:var(--BD);line-height:1.15}
.brand-sub{display:block;font-size:.65rem;color:var(--muted)}
.desk-nav{display:flex;gap:28px}
.desk-nav a{font-size:.9rem;font-weight:600;color:var(--text);position:relative;padding-bottom:2px;transition:color .2s;cursor:pointer}
.desk-nav a::after{content:'';position:absolute;bottom:0;left:0;width:0;height:2px;background:var(--B);border-radius:2px;transition:width .25s}
.desk-nav a:hover{color:var(--B)}
.desk-nav a:hover::after{width:100%}
.hdr-right{display:flex;align-items:center;gap:12px}
.btn-call{display:flex;align-items:center;gap:7px;background:var(--BL);color:var(--B);padding:9px 16px;border-radius:50px;font-size:.83rem;font-weight:700;transition:all .2s;white-space:nowrap;border:none;cursor:pointer}
.btn-call:hover{background:var(--B);color:#fff}
.btn-wa{display:flex;align-items:center;gap:7px;background:#25d366;color:#fff;padding:9px 16px;border-radius:50px;font-size:.83rem;font-weight:700;transition:all .2s;white-space:nowrap;border:none;cursor:pointer}
.btn-wa:hover{background:#128c7e}
.theme-toggle{display:flex;align-items:center;gap:8px;background:var(--off);padding:8px 14px;border-radius:50px;border:none;cursor:pointer;font-size:.9rem;font-weight:600;color:var(--text);transition:all .2s}
.theme-toggle:hover{background:var(--bdr)}
.burger{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:4px}
.burger span{display:block;width:24px;height:2px;background:var(--text);border-radius:2px;transition:all .3s}
.mob-nav{display:none;flex-direction:column;background:var(--bg);border-top:1px solid var(--bdr)}
.mob-nav.open{display:flex}
.mob-nav a{display:flex;align-items:center;gap:12px;padding:14px 24px;font-weight:600;font-size:.97rem;color:var(--text);border-bottom:1px solid var(--shadow-light);cursor:pointer;transition:all .2s}
.mob-nav a:hover{color:var(--B);background:var(--off)}
.mob-nav-btns{display:flex;gap:10px;padding:12px 18px}
.mob-nav-btns .btn-call,.mob-nav-btns .btn-wa{flex:1;justify-content:center}

/* ── HERO ─────────────────────────────────────────────── */
.hero{position:relative;min-height:100vh;display:flex;align-items:center;padding-top:80px;overflow:hidden}
.hero-bg{position:absolute;inset:0;background:linear-gradient(135deg,#001245 0%,#004bb8 55%,#006a8e 100%)}
.hero-bg img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.32}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(135deg,rgba(0,15,60,.88) 0%,rgba(0,60,150,.65) 60%,rgba(0,100,120,.4) 100%)}
.hero-content{position:relative;z-index:2;padding:60px 60px 100px;max-width:680px}
.hero-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.3);color:rgba(255,255,255,.9);padding:7px 16px;border-radius:50px;font-size:.8rem;font-weight:600;margin-bottom:22px;backdrop-filter:blur(4px)}
.hero h1{font-family:'Space Grotesk',sans-serif;font-size:clamp(2.4rem,6vw,4.5rem);font-weight:800;color:#fff;line-height:1.05;margin-bottom:12px;letter-spacing:-1px}
.hero-sub{font-size:clamp(1rem,2vw,1.3rem);color:rgba(255,255,255,.78);margin-bottom:28px}
.hero-checks{display:flex;flex-wrap:wrap;gap:12px 22px;margin-bottom:38px}
.hero-checks li{display:flex;align-items:center;gap:8px;color:rgba(255,255,255,.9);font-size:.95rem;font-weight:500}
.hero-checks li i{color:#4ade80}
.hero-acts{display:flex;flex-wrap:wrap;gap:14px}
.btn-hp{display:inline-block;background:var(--B);color:#fff;padding:15px 38px;border-radius:50px;font-weight:700;font-size:.97rem;box-shadow:0 4px 18px rgba(0,87,184,.45);transition:background .2s,transform .15s;border:none;cursor:pointer}
.btn-hp:hover{background:var(--BD);transform:translateY(-2px)}
.btn-ho{display:inline-flex;align-items:center;gap:8px;border:2px solid rgba(255,255,255,.6);color:#fff;padding:13px 32px;border-radius:50px;font-weight:700;font-size:.97rem;transition:all .2s;background:none;cursor:pointer}
.btn-ho:hover{background:rgba(255,255,255,.14);border-color:#fff}
.hero-wave{position:absolute;bottom:0;left:0;right:0;z-index:1;line-height:0}
.hero-wave svg{width:100%;height:60px}

/* ── WHY CHOOSE US ───────────────────────────────────── */
.why-sec{padding:96px 0;background:var(--bg)}
.why-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:22px}
.why-card{background:var(--off);border:1.5px solid var(--bdr);border-radius:var(--r);padding:32px 22px;text-align:center;transition:transform .25s,box-shadow .25s,border-color .25s}
.why-card:hover{transform:translateY(-6px);box-shadow:var(--shl);border-color:var(--B)}
.why-icon{width:58px;height:58px;border-radius:15px;display:flex;align-items:center;justify-content:center;font-size:1.45rem;color:#fff;margin:0 auto 18px}
.ic1{background:linear-gradient(135deg,#0057b8,#00b4d8)}
.ic2{background:linear-gradient(135deg,#00a896,#00cfb4)}
.ic3{background:linear-gradient(135deg,#0ea5e9,#38bdf8)}
.ic4{background:linear-gradient(135deg,#f59e0b,#fcd34d)}
.why-card h3{font-family:'Space Grotesk',sans-serif;font-size:1.05rem;font-weight:700;margin-bottom:10px}
.why-card p{font-size:.88rem;color:var(--muted);line-height:1.7}

/* ── SERVICES ────────────────────────────────────────── */
.svc-sec{padding:96px 0;background:var(--off)}
.svc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:26px}
.svc-card{background:var(--bg);border-radius:var(--r);border:1.5px solid var(--bdr);box-shadow:var(--sh);overflow:hidden;display:flex;flex-direction:column;transition:transform .25s,box-shadow .25s;cursor:pointer}
.svc-card:hover{transform:translateY(-6px);box-shadow:var(--shl)}
.svc-img{position:relative;height:260px;background:linear-gradient(135deg,var(--BL),#cce0ff);overflow:hidden;display:flex;align-items:center;justify-content:center}
.dark-mode .svc-img{background:linear-gradient(135deg,#1e3a5f,#2c5aa0)}
.svc-img-icon{font-size:3.5rem;color:var(--B);opacity:.6}
.svc-body{padding:22px;flex:1;display:flex;flex-direction:column}
.svc-body h3{font-family:'Space Grotesk',sans-serif;font-size:1.05rem;font-weight:700;margin-bottom:10px;color:var(--text)}
.svc-price{font-size:.95rem;font-weight:700;color:var(--B);margin-bottom:12px}
.svc-desc{font-size:.85rem;color:var(--muted);margin-bottom:14px;flex:1}
.btn-learn{display:block;text-align:center;background:var(--B);color:#fff;padding:11px;border-radius:var(--rs);font-weight:700;font-size:.9rem;transition:background .2s,transform .15s;border:none;cursor:pointer}
.btn-learn:hover{background:var(--BD);transform:translateY(-1px)}

/* ── SERVICE MODAL ───────────────────────────────────── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,10,40,.65);backdrop-filter:blur(6px);z-index:2000;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .3s}
.modal-overlay.open{opacity:1;pointer-events:auto}
.modal{background:var(--bg);border-radius:20px;padding:40px;width:100%;max-width:600px;box-shadow:0 24px 64px rgba(0,0,0,.3);position:relative;animation:modalIn .3s ease;max-height:90vh;overflow-y:auto}
@keyframes modalIn{from{opacity:0;transform:translateY(20px) scale(.97)}to{opacity:1;transform:none}}
.modal-close{position:absolute;top:16px;right:16px;background:var(--off);border:none;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1rem;color:var(--muted);transition:all .2s}
.modal-close:hover{background:var(--bdr);color:var(--text)}
.modal h2{font-family:'Space Grotesk',sans-serif;font-size:1.8rem;font-weight:800;margin-bottom:16px;color:var(--text)}
.modal-price{font-size:1.2rem;color:var(--B);font-weight:700;margin-bottom:20px}
.modal-section{margin-bottom:24px}
.modal-section h3{font-family:'Space Grotesk',sans-serif;font-weight:700;margin-bottom:12px;color:var(--text);font-size:1.05rem}
.modal-section ul{display:flex;flex-direction:column;gap:8px}
.modal-section li{display:flex;align-items:flex-start;gap:10px;font-size:.9rem;color:var(--muted);line-height:1.5}
.modal-section li i{color:var(--T);font-size:.85rem;margin-top:2px;flex-shrink:0}
.modal-actions{display:flex;gap:12px;margin-top:28px}
.btn-primary-modal{flex:1;padding:14px;background:linear-gradient(135deg,var(--B),var(--C));color:#fff;border:none;border-radius:var(--rs);font-weight:700;cursor:pointer;transition:opacity .2s}
.btn-primary-modal:hover{opacity:.9}
.btn-close-modal{flex:1;padding:14px;background:var(--off);color:var(--text);border:1.5px solid var(--bdr);border-radius:var(--rs);font-weight:700;cursor:pointer;transition:all .2s}
.btn-close-modal:hover{border-color:var(--B)}

/* ── TIMINGS DISPLAY ─────────────────────────────────── */
.timings-banner{background:linear-gradient(135deg,var(--B),var(--C));color:#fff;padding:20px 0;margin-bottom:40px;border-radius:var(--r)}
.timings-content{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;align-items:center}
.timings-text h3{font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:1.3rem;margin-bottom:6px}
.timings-text p{font-size:.9rem;opacity:.9}
.timings-hours{display:flex;flex-direction:column;gap:6px;font-size:.85rem}
.timings-hours strong{opacity:.8}

/* ── PROCESS ─────────────────────────────────────────── */
.proc-sec{padding:96px 0;background:linear-gradient(135deg,#001245 0%,#0057b8 100%)}
.proc-row{display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap}
.proc-step{background:rgba(255,255,255,.09);border:1.5px solid rgba(255,255,255,.2);border-radius:var(--r);padding:32px 24px;width:185px;text-align:center;position:relative;backdrop-filter:blur(4px);transition:background .25s,transform .2s}
.proc-step:hover{background:rgba(255,255,255,.16);transform:translateY(-4px)}
.proc-n{position:absolute;top:-13px;left:50%;transform:translateX(-50%);width:26px;height:26px;background:var(--C);color:var(--BD);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:800}
.proc-icon{font-size:1.9rem;color:rgba(255,255,255,.85);margin-bottom:12px}
.proc-step h4{font-family:'Space Grotesk',sans-serif;color:#fff;font-size:.95rem;font-weight:700;margin-bottom:6px}
.proc-step p{font-size:.78rem;color:rgba(255,255,255,.6);line-height:1.5}
.proc-arr{color:rgba(255,255,255,.35);font-size:1.1rem}

/* ── BOOKING FORM ────────────────────────────────────── */
.book-sec{padding:96px 0;background:var(--bg)}
.book-wrap{display:grid;grid-template-columns:1fr 1.7fr;gap:64px;align-items:start}
.book-info h2{font-family:'Space Grotesk',sans-serif;font-size:clamp(1.5rem,2.5vw,2rem);font-weight:800;margin-bottom:16px}
.book-info p{color:var(--muted);line-height:1.8;margin-bottom:28px;font-size:.93rem}
.book-contacts{display:flex;flex-direction:column;gap:14px}
.book-contacts a{display:flex;align-items:center;gap:12px;font-size:.92rem;font-weight:600;color:var(--B);transition:color .2s;cursor:pointer}
.book-contacts a:hover{color:var(--BD)}
.bk-form{background:var(--off);border-radius:var(--r);padding:38px;box-shadow:var(--shl);border:1.5px solid var(--bdr)}
.f-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.f-grp{display:flex;flex-direction:column;gap:6px;margin-bottom:18px}
.f-grp label{font-size:.82rem;font-weight:600;color:var(--text)}
.f-grp label span{color:#ef4444}
.f-grp input,.f-grp select,.f-grp textarea{padding:12px 13px;border:1.5px solid var(--bdr);border-radius:var(--rs);font-size:.9rem;font-family:'Inter',sans-serif;color:var(--text);transition:border-color .2s,box-shadow .2s;background:var(--bg)}
.f-grp input:focus,.f-grp select:focus{outline:none;border-color:var(--B);box-shadow:0 0 0 3px rgba(0,87,184,.12)}
.btn-submit{width:100%;padding:15px;background:linear-gradient(135deg,var(--B),var(--C));color:#fff;border:none;border-radius:var(--rs);font-family:'Inter',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:opacity .2s,transform .15s;box-shadow:0 4px 18px rgba(0,87,184,.3)}
.btn-submit:hover{opacity:.9;transform:translateY(-1px)}
.btn-submit:disabled{opacity:.6;cursor:not-allowed;transform:none}
.form-ok{margin-top:20px;padding:20px 22px;background:#ecfdf5;border:1.5px solid #6ee7b7;border-radius:var(--rs);text-align:center;color:#065f46}
.form-ok i{font-size:2rem;color:#10b981;margin-bottom:8px;display:block}

/* ── REVIEWS ─────────────────────────────────────────── */
.rev-sec{padding:96px 0;background:var(--bg)}
.rev-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
.rev-card{background:var(--off);border:1.5px solid var(--bdr);border-radius:var(--r);padding:26px 22px;transition:transform .25s,box-shadow .25s}
.rev-card:hover{transform:translateY(-5px);box-shadow:var(--shl)}
.rv-top{display:flex;align-items:center;gap:13px;margin-bottom:14px}
.rv-av{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.05rem;font-weight:800;color:#fff;flex-shrink:0}
.rv-stars{color:#f59e0b;font-size:.9rem;margin-top:2px}
.rv-g{margin-left:auto;color:#4285f4}
.rev-card p{font-size:.88rem;color:var(--muted);line-height:1.7;font-style:italic;margin-bottom:12px}
.rv-date{font-size:.76rem;color:#9ca3af}

.gal-sec{padding:96px 0;background:var(--off)}
.gal-grid{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:auto auto;gap:14px}
.g-item{border-radius:var(--rs);overflow:hidden;aspect-ratio:3/2;background:linear-gradient(135deg,#d0e5ff,#b8d4f5);position:relative;cursor:pointer;display:flex;align-items:center;justify-content:center}
.g-label{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(0deg,rgba(0,18,69,.75) 0%,transparent 100%);color:#fff;font-size:.82rem;font-weight:600;padding:18px 13px 11px;transform:translateY(100%);transition:transform .3s}
.vid-sec{padding:96px 0;background:linear-gradient(135deg,#001040 0%,#00346b 100%)}
.vid-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
.vid-card{border-radius:var(--r);overflow:hidden;cursor:pointer}

.vid-thumb{position:relative;aspect-ratio:16/9;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.14);border-radius:var(--r);overflow:hidden;display:flex;align-items:center;justify-content:center}
.vid-play{width:60px;height:60px;background:rgba(0,87,184,.7);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.4rem;color:#fff;transition:background .2s,transform .2s;padding-left:4px}
.vid-card:hover .vid-play{background:var(--B);transform:scale(1.1)}
.vid-title{position:absolute;bottom:12px;left:14px;color:#fff;font-size:.85rem;font-weight:600;text-shadow:0 1px 4px rgba(0,0,0,.6)}


/* ── GALLERY ─────────────────────────────────────────── */
.gal-sec{padding:96px 0;background:var(--off)}
.gal-grid{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:auto auto;gap:14px}
.g-item{border-radius:var(--rs);overflow:hidden;aspect-ratio:4/3;background:linear-gradient(135deg,#d0e5ff,#b8d4f5);position:relative;cursor:pointer;display:flex;align-items:center;justify-content:center}
.g-item.g-big{grid-column:1;grid-row:1/3;aspect-ratio:auto}
.g-icon{font-size:3rem;color:#93bbef}
.g-label{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(0deg,rgba(0,18,69,.75) 0%,transparent 100%);color:#fff;font-size:.82rem;font-weight:600;padding:18px 13px 11px;transform:translateY(100%);transition:transform .3s}
.g-item:hover .g-label{transform:translateY(0)}

/* ── VIDEO GALLERY ───────────────────────────────────── */
.vid-sec{padding:96px 0;background:linear-gradient(135deg,#001040 0%,#00346b 100%)}
.vid-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
.vid-card{border-radius:var(--r);overflow:hidden;cursor:pointer}
.vid-thumb{position:relative;aspect-ratio:16/9;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.14);border-radius:var(--r);overflow:hidden;display:flex;align-items:center;justify-content:center}
.vid-play{width:60px;height:60px;background:rgba(0,87,184,.7);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.4rem;color:#fff;transition:background .2s,transform .2s;padding-left:4px}
.vid-card:hover .vid-play{background:var(--B);transform:scale(1.1)}
.vid-title{position:absolute;bottom:12px;left:14px;color:#fff;font-size:.85rem;font-weight:600;text-shadow:0 1px 4px rgba(0,0,0,.6)}
.vid-error{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;color:rgba(255,255,255,.85);font-size:.78rem;text-align:center;padding:16px;background:rgba(0,10,40,.5)}
.vid-error i{font-size:1.4rem;color:#fca5a5}


/* ── FAQ SECTION ─────────────────────────────────────── */
.faq-sec{padding:96px 0;background:var(--off)}
.faq-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;max-width:1000px;margin:0 auto}
.faq-item{background:var(--bg);border:1.5px solid var(--bdr);border-radius:var(--r);overflow:hidden}
.faq-question{padding:20px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:background .2s;font-weight:600;color:var(--text)}
.faq-question:hover{background:var(--off)}
.faq-question i{color:var(--B);transition:transform .3s}
.faq-item.active .faq-question{background:var(--BL)}
.faq-item.active .faq-question i{transform:rotate(180deg);color:var(--B)}

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

function useScrollAnim() {
  useEffect(() => {
    const obs = new IntersectionObserver(entries => {
      entries.forEach((e,i) => {
        if (e.isIntersecting) {
          const sibs = [...e.target.parentElement.querySelectorAll('.anim')];
          const idx = sibs.indexOf(e.target);
          setTimeout(() => e.target.classList.add('in'), idx * 80);
          obs.unobserve(e.target);
        }
      });
    }, { threshold: 0.1 });
    document.querySelectorAll('.anim').forEach(el => obs.observe(el));
    return () => obs.disconnect();
  });
}

// ════════════════════════════════════════════════
//  THEME TOGGLE
// ════════════════════════════════════════════════
function ThemeToggle() {
  const [isDark, setIsDark] = useState(false);
  useEffect(() => {
    const saved = localStorage.getItem('theme');
    if (saved === 'dark') { setIsDark(true); document.body.classList.add('dark-mode'); }
  }, []);
  function toggle() {
    setIsDark(d => !d);
    document.body.classList.toggle('dark-mode');
    localStorage.setItem('theme', isDark ? 'light' : 'dark');
  }
  return (
    <button className="theme-toggle" onClick={toggle} title={isDark ? 'Light Mode' : 'Dark Mode'}>
      {isDark ? <><i className="fas fa-sun"></i> Day</> : <><i className="fas fa-moon"></i> Night</>}
    </button>
  );
}

// ════════════════════════════════════════════════
//  COUNTER
// ════════════════════════════════════════════════
function Counter({ target }) {
  const [val, setVal] = useState(0);
  const ref = useRef();
  useEffect(() => {
    const obs = new IntersectionObserver(entries => {
      if (entries[0].isIntersecting) {
        obs.disconnect();
        const dur = 1800, start = performance.now();
        const tick = now => {
          const p = Math.min((now-start)/dur, 1);
          const e = 1-Math.pow(1-p,3);
          setVal(Math.floor(e*target));
          if (p<1) requestAnimationFrame(tick);
          else setVal(target);
        };
        requestAnimationFrame(tick);
      }
    }, { threshold: 0.4 });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, [target]);
  return <span ref={ref} className="stat-n">{val.toLocaleString()}</span>;
}

//  VIDEO CARD (with visible error reporting for GitHub Pages debugging)
// ════════════════════════════════════════════════
function VideoCard({ label, src }) {
  const [error, setError] = useState(null);
  const videoRef = useRef(null);

  

  function handleError(e) {
    const codeMap = {
      1: 'Loading aborted',
      2: 'Network error',
      3: 'Decode error — file may be corrupt',
      4: 'File not found or format not supported'
    };
    const mediaError = e.target.error;
    const msg = mediaError ? (codeMap[mediaError.code] || 'Unknown error') : 'Failed to load';
    setError(msg);
    console.error(`[Video failed] "${src}" → ${resolvedSrc} — ${msg}`);
  }

  return (
    <div className="vid-card anim">
      <div className="vid-thumb">
        {!error ? (
          <video
            ref={videoRef}
            controls
            playsInline
            muted
            preload="metadata"
            width="100%"
            height="100%"
            style={{
              width: "100%",
              height: "100%",
              objectFit: "contain",
              display: "block",
              backgroundColor: "#000"
            }}
            onError={handleError}
          >
            <source src={src} type="video/mp4" />
            Your browser does not support HTML5 video.
          </video>
        ) : (
          <div className="vid-error">
            <i className="fas fa-triangle-exclamation"></i>
            <span>Couldn't load "{src}"<br />{error}</span>
          </div>
        )}
        <div className="vid-title">{label}</div>
      </div>
    </div>
  );
}

function FAQItem({ question, answer }) {
  const [open, setOpen] = React.useState(false);

  return (
    <div className={`faq-item ${open ? "active" : ""}`}>
      <div
        className="faq-question"
        onClick={() => setOpen(!open)}
      >
        <span>{question}</span>
        <i className={`fas ${open ? "fa-chevron-up" : "fa-chevron-down"}`}></i>
      </div>

      <div className="faq-answer">
        <p>{answer}</p>
      </div>
    </div>
  );
}
