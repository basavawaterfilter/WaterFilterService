<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>Basava Water Filter Service – Bengaluru</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
:root{
  --B:#0057b8;--BD:#003d82;--BL:#eef5ff;
  --T:#00a896;--C:#00b4d8;--G:#f59e0b;
  --P:#7c3aed;--GR:#16a34a;
  --off:#f8fafc;--muted:#64748b;--bdr:#e2e8f0;
  --sh:0 4px 24px rgba(0,87,184,.10);
  --shl:0 16px 48px rgba(0,87,184,.15);
  --r:14px;--rs:8px;
  --bg:#fff;--text:#1a1a2e;--shadow-light:#f1f5f9;
}
body.dark-mode{
  --bg:#0f172a;--text:#e2e8f0;--off:#1e293b;--muted:#cbd5e1;--bdr:#334155;--shadow-light:#1e293b;
}
body{font-family:'Inter',sans-serif;color:var(--text);background:var(--bg);
  /* CRITICAL: prevent horizontal scroll on ALL devices */
  overflow-x:hidden;
  width:100%;
  transition:background .3s,color .3s
}
a{text-decoration:none;color:inherit}
ul{list-style:none}
img{max-width:100%;display:block}
.wrap{max-width:1180px;margin:0 auto;padding:0 16px}

/* UTILITIES */
.eyebrow{display:inline-block;font-size:.72rem;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--B);background:var(--BL);padding:5px 14px;border-radius:20px;margin-bottom:14px}
.eyebrow.lt{background:rgba(255,255,255,.15);color:rgba(255,255,255,.9)}
.sec-hd{text-align:center;margin-bottom:48px}
.sec-hd h2{font-family:'Space Grotesk',sans-serif;font-size:clamp(1.6rem,3.5vw,2.4rem);font-weight:800;color:var(--text);line-height:1.15}
.sec-hd.lt h2{color:#fff}
.sec-sub{color:var(--muted);margin-top:10px;font-size:.93rem}

/* HEADER */
#hdr{position:fixed;top:0;left:0;right:0;z-index:1000;background:var(--bg);backdrop-filter:blur(12px);border-bottom:1px solid var(--bdr);transition:box-shadow .3s}
#hdr.scrolled{box-shadow:0 4px 24px rgba(0,0,0,.10)}
.hdr-in{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;max-width:1180px;margin:0 auto;gap:8px}
.brand{display:flex;align-items:center;gap:8px;cursor:pointer;min-width:0;flex:1}
.brand-icon{width:36px;height:36px;border-radius:9px;background:linear-gradient(135deg,var(--B),var(--C));display:flex;align-items:center;justify-content:center;color:#fff;font-size:1rem;flex-shrink:0;transition:transform .2s}
.brand:hover .brand-icon{transform:scale(1.07) rotate(-5deg)}
.brand-name{display:block;font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:.92rem;color:var(--BD);line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.brand-sub{display:block;font-size:.58rem;color:var(--muted)}
.desk-nav{display:flex;gap:22px}
.desk-nav a{font-size:.88rem;font-weight:600;color:var(--text);position:relative;padding-bottom:2px;transition:color .2s;cursor:pointer}
.desk-nav a::after{content:'';position:absolute;bottom:0;left:0;width:0;height:2px;background:var(--B);border-radius:2px;transition:width .25s}
.desk-nav a:hover{color:var(--B)}
.desk-nav a:hover::after{width:100%}
.hdr-right{display:flex;align-items:center;gap:8px}
.btn-call{display:flex;align-items:center;gap:6px;background:var(--BL);color:var(--B);padding:8px 14px;border-radius:50px;font-size:.8rem;font-weight:700;transition:all .2s;white-space:nowrap;border:none;cursor:pointer}
.btn-call:hover{background:var(--B);color:#fff}
.btn-wa{display:flex;align-items:center;gap:6px;background:#25d366;color:#fff;padding:8px 14px;border-radius:50px;font-size:.8rem;font-weight:700;transition:all .2s;white-space:nowrap;border:none;cursor:pointer}
.btn-wa:hover{background:#128c7e}
.theme-toggle{display:flex;align-items:center;gap:7px;background:var(--off);padding:8px 12px;border-radius:50px;border:none;cursor:pointer;font-size:.87rem;font-weight:600;color:var(--text);transition:all .2s}
.theme-toggle:hover{background:var(--bdr)}
.burger{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:6px;flex-shrink:0}
.burger span{display:block;width:22px;height:2px;background:var(--text);border-radius:2px;transition:all .3s}
.mob-nav{display:none;flex-direction:column;background:var(--bg);border-top:1px solid var(--bdr)}
.mob-nav.open{display:flex}
.mob-nav a{display:flex;align-items:center;gap:12px;padding:14px 18px;font-weight:600;font-size:.95rem;color:var(--text);border-bottom:1px solid var(--shadow-light);cursor:pointer;transition:all .2s}
.mob-nav a:hover{color:var(--B);background:var(--off)}
.mob-nav-btns{display:flex;gap:8px;padding:12px 14px 16px}
.mob-nav-btns .btn-call,.mob-nav-btns .btn-wa{flex:1;justify-content:center}

/* HERO */
.hero{position:relative;min-height:100vh;display:flex;align-items:center;padding-top:70px;overflow:hidden}
.hero-bg{position:absolute;inset:0;background:linear-gradient(135deg,#001245 0%,#004bb8 55%,#006a8e 100%)}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(135deg,rgba(0,15,60,.88) 0%,rgba(0,60,150,.65) 60%,rgba(0,100,120,.4) 100%)}
.hero-content{position:relative;z-index:2;padding:50px 18px 110px;width:100%;max-width:680px}
.hero-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.3);color:rgba(255,255,255,.9);padding:7px 14px;border-radius:50px;font-size:.76rem;font-weight:600;margin-bottom:18px;backdrop-filter:blur(4px)}
.hero h1{font-family:'Space Grotesk',sans-serif;font-size:clamp(1.9rem,6.5vw,4.5rem);font-weight:800;color:#fff;line-height:1.05;margin-bottom:12px;letter-spacing:-1px}
.hero-sub{font-size:clamp(.9rem,2.5vw,1.3rem);color:rgba(255,255,255,.78);margin-bottom:22px}
.hero-checks{display:flex;flex-wrap:wrap;gap:10px 16px;margin-bottom:28px}
.hero-checks li{display:flex;align-items:center;gap:7px;color:rgba(255,255,255,.9);font-size:.88rem;font-weight:500}
.hero-checks li i{color:#4ade80}
.hero-acts{display:flex;flex-wrap:wrap;gap:12px}
.btn-hp{display:inline-block;background:var(--B);color:#fff;padding:13px 30px;border-radius:50px;font-weight:700;font-size:.93rem;box-shadow:0 4px 18px rgba(0,87,184,.45);transition:background .2s,transform .15s;border:none;cursor:pointer}
.btn-hp:hover{background:var(--BD);transform:translateY(-2px)}
.btn-ho{display:inline-flex;align-items:center;gap:8px;border:2px solid rgba(255,255,255,.6);color:#fff;padding:11px 26px;border-radius:50px;font-weight:700;font-size:.93rem;transition:all .2s;background:none;cursor:pointer}
.btn-ho:hover{background:rgba(255,255,255,.14);border-color:#fff}
.hero-wave{position:absolute;bottom:0;left:0;right:0;z-index:1;line-height:0}
.hero-wave svg{width:100%;height:50px}

/* WHY */
.why-sec{padding:80px 0;background:var(--bg)}
.why-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
.why-card{background:var(--off);border:1.5px solid var(--bdr);border-radius:var(--r);padding:26px 16px;text-align:center;transition:transform .25s,box-shadow .25s,border-color .25s}
.why-card:hover{transform:translateY(-6px);box-shadow:var(--shl);border-color:var(--B)}
.why-icon{width:52px;height:52px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;color:#fff;margin:0 auto 14px}
.ic1{background:linear-gradient(135deg,#0057b8,#00b4d8)}
.ic2{background:linear-gradient(135deg,#00a896,#00cfb4)}
.ic3{background:linear-gradient(135deg,#0ea5e9,#38bdf8)}
.ic4{background:linear-gradient(135deg,#f59e0b,#fcd34d)}
.why-card h3{font-family:'Space Grotesk',sans-serif;font-size:.98rem;font-weight:700;margin-bottom:8px}
.why-card p{font-size:.83rem;color:var(--muted);line-height:1.7}

/* SERVICES */
.svc-sec{padding:80px 0;background:var(--off)}
.svc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.svc-card{background:var(--bg);border-radius:var(--r);border:1.5px solid var(--bdr);box-shadow:var(--sh);overflow:hidden;display:flex;flex-direction:column;transition:transform .25s,box-shadow .25s;cursor:pointer}
.svc-card:hover{transform:translateY(-6px);box-shadow:var(--shl)}
.svc-img{position:relative;height:210px;background:linear-gradient(135deg,var(--BL),#cce0ff);overflow:hidden;display:flex;align-items:center;justify-content:center}
.dark-mode .svc-img{background:linear-gradient(135deg,#1e3a5f,#2c5aa0)}
.svc-body{padding:16px;flex:1;display:flex;flex-direction:column}
.svc-body h3{font-family:'Space Grotesk',sans-serif;font-size:.97rem;font-weight:700;margin-bottom:7px;color:var(--text)}
.svc-price{font-size:.88rem;font-weight:700;color:var(--B);margin-bottom:9px}
.svc-desc{font-size:.82rem;color:var(--muted);margin-bottom:11px;flex:1}
.btn-learn{display:block;text-align:center;background:var(--B);color:#fff;padding:10px;border-radius:var(--rs);font-weight:700;font-size:.87rem;transition:background .2s;border:none;cursor:pointer}
.btn-learn:hover{background:var(--BD)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,10,40,.65);backdrop-filter:blur(6px);z-index:2000;display:flex;align-items:center;justify-content:center;padding:14px;opacity:0;pointer-events:none;transition:opacity .3s}
.modal-overlay.open{opacity:1;pointer-events:auto}
.modal{background:var(--bg);border-radius:18px;padding:24px 18px;width:100%;max-width:600px;box-shadow:0 24px 64px rgba(0,0,0,.3);position:relative;animation:modalIn .3s ease;max-height:92vh;overflow-y:auto}
@keyframes modalIn{from{opacity:0;transform:translateY(20px) scale(.97)}to{opacity:1;transform:none}}
.modal-close{position:absolute;top:13px;right:13px;background:var(--off);border:none;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.9rem;color:var(--muted)}
.modal-close:hover{background:var(--bdr)}
.modal h2{font-family:'Space Grotesk',sans-serif;font-size:1.35rem;font-weight:800;margin-bottom:10px;color:var(--text);padding-right:36px}
.modal-price{font-size:1.05rem;color:var(--B);font-weight:700;margin-bottom:14px}
.modal-section{margin-bottom:18px}
.modal-section h3{font-family:'Space Grotesk',sans-serif;font-weight:700;margin-bottom:9px;color:var(--text);font-size:.95rem}
.modal-section ul{display:flex;flex-direction:column;gap:7px}
.modal-section li{display:flex;align-items:flex-start;gap:9px;font-size:.85rem;color:var(--muted);line-height:1.5}
.modal-section li i{color:var(--T);font-size:.8rem;margin-top:2px;flex-shrink:0}
.modal-actions{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap}
.btn-primary-modal{flex:1;min-width:130px;padding:13px;background:linear-gradient(135deg,var(--B),var(--C));color:#fff;border:none;border-radius:var(--rs);font-weight:700;cursor:pointer;font-size:.9rem;text-align:center}
.btn-primary-modal:hover{opacity:.9}
.btn-close-modal{flex:1;min-width:130px;padding:13px;background:var(--off);color:var(--text);border:1.5px solid var(--bdr);border-radius:var(--rs);font-weight:700;cursor:pointer;font-size:.9rem}
.btn-close-modal:hover{border-color:var(--B)}

/* TIMINGS */
.timings-banner{background:linear-gradient(135deg,var(--B),var(--C));color:#fff;padding:18px 16px;margin-bottom:36px;border-radius:var(--r)}
.timings-content{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;align-items:center}
.timings-text h3{font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:1.1rem;margin-bottom:4px}
.timings-text p{font-size:.84rem;opacity:.9}
.timings-hours{display:flex;flex-direction:column;gap:5px;font-size:.82rem}

/* PROCESS */
.proc-sec{padding:80px 0;background:linear-gradient(135deg,#001245 0%,#0057b8 100%)}
.proc-row{display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap}
.proc-step{background:rgba(255,255,255,.09);border:1.5px solid rgba(255,255,255,.2);border-radius:var(--r);padding:26px 16px;width:165px;text-align:center;position:relative;backdrop-filter:blur(4px);transition:background .25s,transform .2s}
.proc-step:hover{background:rgba(255,255,255,.16);transform:translateY(-4px)}
.proc-n{position:absolute;top:-12px;left:50%;transform:translateX(-50%);width:24px;height:24px;background:var(--C);color:var(--BD);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.76rem;font-weight:800}
.proc-icon{font-size:1.7rem;color:rgba(255,255,255,.85);margin-bottom:9px}
.proc-step h4{font-family:'Space Grotesk',sans-serif;color:#fff;font-size:.88rem;font-weight:700;margin-bottom:4px}
.proc-step p{font-size:.74rem;color:rgba(255,255,255,.6);line-height:1.5}
.proc-arr{color:rgba(255,255,255,.35);font-size:.95rem}

/* BOOKING */
.book-sec{padding:80px 0;background:var(--bg)}
.book-wrap{display:grid;grid-template-columns:1fr 1.7fr;gap:52px;align-items:start}
.book-info h2{font-family:'Space Grotesk',sans-serif;font-size:clamp(1.35rem,2.5vw,2rem);font-weight:800;margin-bottom:13px}
.book-info p{color:var(--muted);line-height:1.8;margin-bottom:22px;font-size:.9rem}
.book-contacts{display:flex;flex-direction:column;gap:12px}
.book-contacts a{display:flex;align-items:center;gap:10px;font-size:.9rem;font-weight:600;color:var(--B);transition:color .2s;cursor:pointer;word-break:break-word}
.book-contacts a:hover{color:var(--BD)}
.bk-form{background:var(--off);border-radius:var(--r);padding:28px 20px;box-shadow:var(--shl);border:1.5px solid var(--bdr)}
.f-row{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.f-grp{display:flex;flex-direction:column;gap:5px;margin-bottom:15px}
.f-grp label{font-size:.79rem;font-weight:600;color:var(--text)}
.f-grp label span{color:#ef4444}
.f-grp input,.f-grp select,.f-grp textarea{padding:11px 11px;border:1.5px solid var(--bdr);border-radius:var(--rs);font-size:.87rem;font-family:'Inter',sans-serif;color:var(--text);transition:border-color .2s,box-shadow .2s;background:var(--bg);width:100%}
.f-grp input:focus,.f-grp select:focus{outline:none;border-color:var(--B);box-shadow:0 0 0 3px rgba(0,87,184,.12)}
.btn-submit{width:100%;padding:14px;background:linear-gradient(135deg,var(--B),var(--C));color:#fff;border:none;border-radius:var(--rs);font-family:'Inter',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:opacity .2s,transform .15s;box-shadow:0 4px 18px rgba(0,87,184,.3)}
.btn-submit:hover{opacity:.9;transform:translateY(-1px)}
.btn-submit:disabled{opacity:.6;cursor:not-allowed;transform:none}
.form-ok{padding:22px 16px;background:#ecfdf5;border:1.5px solid #6ee7b7;border-radius:var(--rs);text-align:center;color:#065f46}
.form-ok i{font-size:2rem;color:#10b981;margin-bottom:8px;display:block}
.form-ok strong{display:block;margin-bottom:6px;font-size:1rem}

/* REVIEWS */
.rev-sec{padding:80px 0;background:var(--bg)}
.rev-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.rev-card{background:var(--off);border:1.5px solid var(--bdr);border-radius:var(--r);padding:20px 16px;transition:transform .25s,box-shadow .25s}
.rev-card:hover{transform:translateY(-5px);box-shadow:var(--shl)}
.rv-top{display:flex;align-items:center;gap:11px;margin-bottom:11px}
.rv-av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:800;color:#fff;flex-shrink:0}
.rv-stars{color:#f59e0b;font-size:.87rem;margin-top:2px}
.rev-card p{font-size:.85rem;color:var(--muted);line-height:1.7;font-style:italic}

/* GALLERY */
.gal-sec{padding:80px 0;background:var(--off)}
.gal-grid{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:auto auto;gap:11px}
.g-item{border-radius:var(--rs);overflow:hidden;aspect-ratio:4/3;background:linear-gradient(135deg,#d0e5ff,#b8d4f5);position:relative;cursor:pointer;display:flex;align-items:center;justify-content:center}
.g-item.g-big{grid-column:1;grid-row:1/3;aspect-ratio:auto}
.g-label{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(0deg,rgba(0,18,69,.75) 0%,transparent 100%);color:#fff;font-size:.79rem;font-weight:600;padding:14px 11px 9px;transform:translateY(100%);transition:transform .3s}
.g-item:hover .g-label{transform:translateY(0)}

/* VIDEO */
.vid-sec{padding:80px 0;background:linear-gradient(135deg,#001040 0%,#00346b 100%)}
.vid-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.vid-card{border-radius:var(--r);overflow:hidden}
.vid-thumb{position:relative;aspect-ratio:16/9;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.14);border-radius:var(--r);overflow:hidden;display:flex;align-items:center;justify-content:center}
.vid-title{position:absolute;bottom:9px;left:11px;color:#fff;font-size:.8rem;font-weight:600;text-shadow:0 1px 4px rgba(0,0,0,.6)}
.vid-error{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;color:rgba(255,255,255,.85);font-size:.76rem;text-align:center;padding:14px;background:rgba(0,10,40,.5)}
.vid-error i{font-size:1.3rem;color:#fca5a5}

/* FAQ */
.faq-sec{padding:80px 0;background:var(--off)}
.faq-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:15px;max-width:1000px;margin:0 auto}
.faq-item{background:var(--bg);border:1.5px solid var(--bdr);border-radius:var(--r);overflow:hidden}
.faq-question{padding:16px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:background .2s;font-weight:600;color:var(--text);font-size:.89rem;gap:10px}
.faq-question:hover{background:var(--off)}
.faq-question i{color:var(--B);transition:transform .3s;flex-shrink:0}
.faq-item.active .faq-question{background:var(--BL)}
.faq-item.active .faq-question i{transform:rotate(180deg)}
.faq-answer{padding:0 14px;max-height:0;overflow:hidden;transition:max-height .3s ease,padding .3s ease;color:var(--muted);font-size:.86rem;line-height:1.7}
.faq-item.active .faq-answer{padding:0 14px 15px;max-height:500px}

/* STATS */
.stats-sec{padding:60px 0;background:linear-gradient(135deg,var(--B),var(--C))}
.stats-row{display:flex;align-items:center;justify-content:center;flex-wrap:wrap}
.stat-item{text-align:center;flex:1;min-width:120px;padding:16px 10px}
.stat-n{display:inline-block;font-family:'Space Grotesk',sans-serif;font-size:clamp(1.9rem,5vw,3.4rem);font-weight:800;color:#fff;line-height:1}
.stat-plus{font-size:1.6rem;font-weight:800;color:rgba(255,255,255,.7);vertical-align:top;margin-top:4px}
.stat-item p{font-size:.79rem;color:rgba(255,255,255,.72);margin-top:6px;font-weight:600}
.stat-div{width:1px;height:54px;background:rgba(255,255,255,.22)}

/* MAP */
.map-sec{padding:80px 0;background:var(--bg)}
.map-box{border-radius:var(--r);overflow:hidden;box-shadow:var(--shl);border:1.5px solid var(--bdr)}

/* CONTACT — supports 5 cards */
.contact-sec{padding:80px 0;background:var(--off)}
.contact-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}
.contact-card{background:var(--bg);border-radius:var(--r);padding:22px 12px;text-align:center;border:1.5px solid var(--bdr);box-shadow:var(--sh);transition:transform .25s,box-shadow .25s}
.contact-card:hover{transform:translateY(-5px);box-shadow:var(--shl)}
.cc-icon{width:44px;height:44px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:1.15rem;margin:0 auto 11px}
.cc-blue{background:var(--BL);color:var(--B)}
.cc-green{background:#d1fae5;color:#16a34a}
.cc-gold{background:#fef3c7;color:var(--G)}
.cc-purple{background:#ede9fe;color:var(--P)}
.cc-pink{background:#fdf2f8;color:#e1306c}
.contact-card h4{font-family:'Space Grotesk',sans-serif;font-weight:700;margin-bottom:7px;font-size:.88rem;color:var(--text)}
.contact-card a{display:block;color:var(--B);font-weight:600;font-size:.81rem;margin-bottom:4px;word-break:break-word;transition:color .2s}
.contact-card a:hover{color:var(--BD)}
.contact-card p{font-size:.77rem;color:var(--muted);line-height:1.5}

/* FOOTER */
.footer{background:#09111f;padding:44px 0 0}

/* ══════════════════════════════════════════════
   FLOATING BUTTONS — THE KEY FIX
   Use a wrapper that is positioned inside the
   viewport so NEITHER button ever goes off-screen
   ══════════════════════════════════════════════ */
.fab-wrap{
  position:fixed;
  bottom:18px;
  /* Anchor to left:0 right:0 so it uses viewport width */
  left:0;
  right:0;
  /* Flexbox: one button on each edge */
  display:flex;
  justify-content:space-between;
  /* Horizontal padding keeps buttons away from screen edges */
  padding:0 14px;
  z-index:999;
  /* Children are clickable, wrapper is not */
  pointer-events:none;
}
.fab-call,.fab-wa{
  display:inline-flex;
  align-items:center;
  gap:7px;
  padding:11px 18px;
  border-radius:50px;
  color:#fff;
  font-size:.85rem;
  font-weight:700;
  box-shadow:0 4px 18px rgba(0,0,0,.28);
  transition:transform .2s;
  cursor:pointer;
  border:none;
  text-decoration:none;
  pointer-events:auto;
  white-space:nowrap;
  /* Prevent growing beyond content */
  flex-shrink:0;
}
.fab-call{background:var(--B)}
.fab-wa{background:#25d366}
.fab-call:hover,.fab-wa:hover{transform:translateY(-3px)}

/* SCROLL ANIM */
.anim{opacity:0;transform:translateY(24px);transition:opacity .6s ease,transform .6s ease}
.anim.in{opacity:1;transform:none}

function useScrollAnim() {
  useEffect(() => {
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          const sibs = [...e.target.parentElement.querySelectorAll('.anim')];
          setTimeout(() => e.target.classList.add('in'), sibs.indexOf(e.target) * 80);
          obs.unobserve(e.target);
        }
      });
    }, { threshold: 0.1 });
    document.querySelectorAll('.anim').forEach(el => obs.observe(el));
    return () => obs.disconnect();
  });
}

function ThemeToggle() {
  const [isDark, setIsDark] = useState(false);
  useEffect(() => {
    if (localStorage.getItem('theme') === 'dark') { setIsDark(true); document.body.classList.add('dark-mode'); }
  }, []);
  function toggle() {
    const next = !isDark;
    setIsDark(next);
    document.body.classList.toggle('dark-mode', next);
    localStorage.setItem('theme', next ? 'dark' : 'light');
  }
  return (
    <button className="theme-toggle" onClick={toggle}>
      {isDark ? <><i className="fas fa-sun"></i> Day</> : <><i className="fas fa-moon"></i> Night</>}
    </button>
  );
}

function Counter({ target }) {
  const [val, setVal] = useState(0);
  const ref = useRef();
  useEffect(() => {
    const obs = new IntersectionObserver(entries => {
      if (entries[0].isIntersecting) {
        obs.disconnect();
        const dur = 1800, start = performance.now();
        const tick = now => {
          const p = Math.min((now-start)/dur,1);
          setVal(Math.floor((1-Math.pow(1-p,3))*target));
          if(p<1) requestAnimationFrame(tick); else setVal(target);
        };
        requestAnimationFrame(tick);
      }
    }, { threshold: 0.4 });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, [target]);
  return <span ref={ref} className="stat-n">{val.toLocaleString()}</span>;
}
